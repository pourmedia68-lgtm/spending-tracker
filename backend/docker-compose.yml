services:
  postgres:
    image: postgres:16-alpine
    container_name: spending-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spending
      POSTGRES_PASSWORD: spending
      POSTGRES_DB: spending_tracker
    ports:
      - "5432:5432"
    volumes:
      - spending-tracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spending -d spending_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  spending-tracker-pgdata:
