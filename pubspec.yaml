name: spending_tracker
description: "Premium fintech spending tracker built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^0.69.0

  # Icons
  phosphor_flutter: ^2.1.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
